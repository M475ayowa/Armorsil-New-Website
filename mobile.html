<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armorsil West Africa</title>
    <link rel="icon" type="image/png" href="asset/armorsilwa-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a2a5e;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -40%;
            width: 90%;
            height: 90%;
            background: url('asset/armorsilwa-favicon.png') no-repeat center / contain;
            opacity: 0.06;
            transform: translateY(-50%);
            pointer-events: none;
            animation: floatFavicon 23s ease-in-out infinite;
        }

        @keyframes floatFavicon {
            0%, 100% { transform: translateY(-50%) translateX(0) rotate(0deg); }
            33% { transform: translateY(-50%) translateX(-20px) rotate(4deg); }
            66% { transform: translateY(-52%) translateX(16px) rotate(-3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 24px 32px;
            max-width: 420px;
            width: 100%;
            overflow-y: hidden;
        }

        .logo-wrap {
            display: inline-flex;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            margin-bottom: 28px;
            animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
        }

        .logo {
            width: 120px;
            height: auto;
            display: block;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
        }

        .icon-wrap svg {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.15);
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #ffffff;
            margin-bottom: 10px;
            animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
        }

        h1 span {
            color: #E5242B;
        }

        .message {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 24px;
            font-weight: 600;
            animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: #E5242B;
            border-radius: 4px;
            margin: 0 auto 24px;
            animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
        }

        .badge svg {
            width: 14px;
            height: 14px;
            color: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrap">
            <img src="asset/armorsilwa-logo.png" alt="Armorsil West Africa" class="logo">
        </div>

        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <path d="M8 21h8"/>
                <path d="M12 17v4"/>
                <path d="M2 10h20"/>
            </svg>
        </div>

        <h1>Desktop View<br><span>Required</span></h1>

        <p class="message">
            This website is optimised for laptop and desktop screens.<br>
            A mobile-optimised version is coming soon.
        </p>

        <div class="divider"></div>

        <div class="badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
            Mobile Experience — Coming Soon
        </div>
    </div>
</body>
</html>
